<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Scheduler</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css"> 
</head>
<body>

    <div class="top-bar">
        <h1>Project & Task Scheduler</h1>
        
        <div class="top-actions">
            <button class="btn-toggle-theme" id="theme-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
            <input type="date" id="date-picker" class="date-picker">
            <button class="btn-add-day" onclick="addNewDay()">+ Thêm Bảng Ngày Mới</button>
        </div>
    </div>

    <div id="boards-area"></div>

    <script src="manager.js"></script>
</body>
</html>
